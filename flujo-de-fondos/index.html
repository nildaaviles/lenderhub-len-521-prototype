<script>
  // Toggle the Flujo de Fondos children + flip caret icon
  function toggleFlujos(){
    const kids = document.getElementById('flujosKids');
    const caret = document.getElementById('flujosCaret');
    const isHidden = kids.classList.toggle('hidden');
    caret.classList.toggle('ph-caret-down', !isHidden);
    caret.classList.toggle('ph-caret-right', isHidden);
  }
</script>
