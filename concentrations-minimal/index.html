<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Concentration Criteria — LenderHub</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#1a1d24; --muted:#6b7280; --line:#e6e8eb;
    --gray:#eef0f3; --gray-ink:#4b5563;
    --green:#15803d; --green-bg:#e8f5ec;
    --red:#b42318; --red-bg:#fdeceb;
    --blue:#1d4ed8; --blue-bg:#eaf0fe;
    --amber:#92600a; --amber-bg:#fcf3e3;
    --brand:#7a1f5c;
    --radius:12px;
    font-synthesis:none;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:28px 24px 80px}

  /* Header */
  .top{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:20px}
  h1{font-size:22px;margin:0 0 4px;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13px}
  .selector{display:flex;flex-direction:column;gap:6px;min-width:300px}
  .selector label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  select{font:inherit;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);cursor:pointer}

  .meta{display:flex;gap:18px;flex-wrap:wrap;margin:0 0 22px;padding:14px 18px;background:var(--card);
    border:1px solid var(--line);border-radius:var(--radius)}
  .meta div{font-size:13px}
  .meta b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;margin-bottom:2px}

  /* Compliance Overview */
  .overview{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .stat .n{font-size:26px;font-weight:700;letter-spacing:-.02em}
  .stat .l{font-size:12px;color:var(--muted);margin-top:2px}
  .stat.breach .n{color:var(--red)}

  /* Accordion */
  .group{margin-bottom:14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);overflow:hidden}
  .group > summary{list-style:none;cursor:pointer;padding:14px 18px;display:flex;align-items:center;gap:10px;
    font-weight:600;font-size:14px;user-select:none}
  .group > summary::-webkit-details-marker{display:none}
  .chev{transition:transform .15s;color:var(--muted)}
  details[open] > summary .chev{transform:rotate(90deg)}
  .gcount{margin-left:auto;font-weight:500;font-size:12px;color:var(--muted)}

  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
    font-weight:600;padding:8px 14px;border-top:1px solid var(--line);background:#fafbfc}
  thead th.num{text-align:right}
  tbody td{padding:13px 14px;border-top:1px solid var(--line);vertical-align:top}
  tbody tr:hover{background:#fcfcfd}
  .idx{color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:600}
  .legal{max-width:540px;color:var(--ink)}
  .legal .kindtag{display:inline-block;margin-top:5px;font-size:10.5px;color:var(--gray-ink);
    background:var(--gray);padding:1px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .actual{font-weight:600}

  /* Limit chip — neutral by design */
  .limit-chip{display:inline-flex;align-items:center;gap:4px;background:var(--gray);color:var(--gray-ink);
    padding:3px 9px;border-radius:7px;font-weight:600;font-variant-numeric:tabular-nums}
  .limit-chip .op{font-size:10px;opacity:.7;font-weight:700}

  /* Status badges */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:7px;font-size:12px;font-weight:600;white-space:nowrap}
  .b-ok{background:var(--green-bg);color:var(--green)}
  .b-fail{background:var(--red-bg);color:var(--red)}
  .b-info{background:var(--blue-bg);color:var(--blue)}
  .b-var{background:var(--amber-bg);color:var(--amber)}
  .b-na{background:var(--gray);color:var(--gray-ink)}
  .b-inactive{background:var(--gray);color:var(--gray-ink)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

  .excess{font-weight:600;color:var(--red)}
  .excess.none{color:var(--muted);font-weight:400}

  /* Cohort sub-table (VARIABLE) */
  .cohort-toggle{margin-top:7px;font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;font-weight:600}
  .cohort{margin-top:10px;border:1px solid var(--line);border-radius:8px;overflow:hidden;display:none}
  .cohort.open{display:block}
  .cohort table{font-size:12px}
  .cohort thead th{background:#f4f5f7;padding:6px 10px}
  .cohort td{padding:6px 10px}
  .cohort .b-ok,.cohort .b-fail{font-size:11px;padding:1px 6px}

  .empty{padding:48px;text-align:center;color:var(--muted)}
  footer{margin-top:30px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .btn{font:inherit;font-size:12px;font-weight:600;padding:8px 14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;color:var(--ink)}
  @media(max-width:720px){.overview{grid-template-columns:repeat(2,1fr)}.legal{max-width:none}}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div>
      <h1>Concentration Criteria</h1>
      <div class="sub">Compliance overview — backup servicer monthly report</div>
    </div>
    <div class="selector">
      <label for="trust">Trust / Fideicomiso</label>
      <select id="trust"></select>
    </div>
  </div>

  <div class="meta" id="meta"></div>

  <div class="overview" id="overview"></div>

  <div id="criteria"></div>

  <footer>
    <span id="src"></span>
    <button class="btn" onclick="downloadCSV()">Download CSV</button>
  </footer>

</div>

<script>
/* =========================================================================
   DECLARATIVE ENGINE — one engine, N trusts via selector.
   Rule kinds: concentration_max · composition_floor · aggregate_cap
               · count_limit · eligibility · informative · conditional · variable
   Design rules (locked LEN-664):
     - limit chip is ALWAYS neutral gray (a defined limit is not an alarm)
     - red is reserved for breach / excess only
     - legal_text is verbatim, in the language of the CONTRACT (here: English)
     - chrome/UI is English

          cohorts:[
            {k:"31/05/2025", actual:41.8, limit:50},
            {k:"30/06/2025", actual:0.0,  limit:50},
            {k:"30/04/2025", actual:0.0,  limit:50},

            {k:"28/02/2025", actual:0.0,  limit:50},
          ]},
        {idx:"(ix)", kind:"aggregate_cap", op:"max", limit:394000000, unit:"MXN", subject:"per Monthly Vintage",
          legal:"The aggregate Purchase Price of any Monthly Vintage (including Loans transferred on prior Purchase Dates) does not exceed MXP394,000,000.",
          cohorts:[
            {k:"31/05/2025", actual:135574110, limit:394000000},
            {k:"30/04/2025", actual:307327948, limit:394000000},
            {k:"31/03/2025", actual:307690065, limit:394000000},
            {k:"31/12/2024", actual:295949136, limit:394000000},
            {k:"30/11/2024", actual:303638671, limit:394000000},
            {k:"31/10/2024", actual:307200923, limit:394000000},
          ]},
      ]},
      { title: "Eligibility Criteria (per-loan filter)", rules: [
        {idx:"E1", kind:"eligibility", actual:null, legal:"The Loan was originated directly by the Originator in the ordinary course of business; the Obligor has a Seller Score of A, B, C, D or E; the remaining term is ≤360 days and ≥60 days; direct debit mechanism to MP Wallet's account; original principal ≤MXP40,000; annualized interest rate ≤150%; denominated and payable solely in MXP; not refinanced/restructured; not a Deceased Loan at transfer."},

};

/* ---------- formatting helpers ---------- */
const fmt = (n,unit)=>{
  if(n===null||n===undefined) return "—";
  if(unit==="MXN") return "$"+n.toLocaleString("en-US");
  if(unit==="days") return n+" d";
  return n.toFixed(2)+"%";
};
const opSym = op => op==="min" ? "≥" : "≤";

/* ---------- compliance engine ---------- */
function evaluate(r){
  // returns {status, badge, excess}
  if(r.kind==="informative"){
    const ok = r.op==="min" ? r.actual>=r.limit : r.actual<=r.limit;
    return {status:"INFO", badgeClass:"b-info", badgeText:"Info · "+(ok?"within":"outside"), excess:null};
  }
  if(r.kind==="eligibility"){
    return {status:"ELIG", badgeClass:"b-info", badgeText:"Eligibility filter", excess:null};
  }
  if(r.kind==="conditional" && r.active===false){
    return {status:"INACTIVE", badgeClass:"b-inactive", badgeText:"Inactive · trigger not met", excess:null};
  }
  if(r.kind==="variable" || (r.cohorts && r.cohorts.length)){
    const breaches = r.cohorts.filter(c=> r.op==="min" ? c.actual<c.limit : c.actual>c.limit);
    if(breaches.length) return {status:"FAIL", badgeClass:"b-fail", badgeText:breaches.length+" cohort breach", excess:null};
    return {status:"VARIABLE", badgeClass:"b-var", badgeText:"Variable · "+r.cohorts.length+" cohorts OK", excess:null};
  }
  if(r.actual===null||r.limit===null){
    return {status:"NA", badgeClass:"b-na", badgeText:"N/A · missing data", excess:null};
  }
  // standard max / min
  const ok = r.op==="min" ? r.actual>=r.limit : r.actual<=r.limit;
  let excess=null;
  if(!ok){
    excess = r.op==="min" ? (r.limit-r.actual) : (r.actual-r.limit);
  }
  return ok
    ? {status:"OK", badgeClass:"b-ok", badgeText:"Satisfied", excess:null}
    : {status:"FAIL", badgeClass:"b-fail", badgeText:"Breach", excess};
}

/* ---------- render ---------- */
let current = "cib3305";

function renderSelector(){
  const sel = document.getElementById("trust");
  sel.innerHTML = Object.entries(DATA).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join("");
  sel.value = current;
  sel.onchange = e=>{ current=e.target.value; render(); };
}

function render(){
  const d = DATA[current];
  document.getElementById("meta").innerHTML = `
    <div><b>Originator</b>${d.originator}</div>
    <div><b>Agent</b>${d.agent}</div>
    <div><b>Cut-off date</b>${d.cutoff}</div>`;
  document.getElementById("src").textContent = "Source: "+d.src;

  // overview
  let total=0, ok=0, breach=0, other=0;
  d.groups.forEach(g=>g.rules.forEach(r=>{
    total++;
    const e=evaluate(r);
    if(e.status==="OK"||e.status==="VARIABLE") ok++;
    else if(e.status==="FAIL") breach++;
    else other++;
  }));
  document.getElementById("overview").innerHTML = `
    <div class="stat"><div class="n">${total}</div><div class="l">Criteria tracked</div></div>
    <div class="stat"><div class="n">${ok}</div><div class="l">Within limit</div></div>
    <div class="stat ${breach?'breach':''}"><div class="n">${breach}</div><div class="l">In breach</div></div>
    <div class="stat"><div class="n">${other}</div><div class="l">Info / inactive / N&#8203;/A</div></div>`;

  // groups
  const root = document.getElementById("criteria");
  if(!d.groups.length){ root.innerHTML = `<div class="group"><div class="empty">No concentration rules defined for this trust.</div></div>`; return; }

  root.innerHTML = d.groups.map((g,gi)=>{
    const rows = g.rules.map((r,ri)=>{
      const e = evaluate(r);
      const hasCohorts = r.cohorts && r.cohorts.length;
      const limitCell = (r.limit===null||r.limit===undefined)
        ? '<span class="badge b-na">—</span>'
        : `<span class="limit-chip"><span class="op">${opSym(r.op)}</span>${fmt(r.limit,r.unit)}</span>`;
      const actualCell = r.actual===null||r.actual===undefined
        ? (hasCohorts ? `<span style="color:var(--muted)">per cohort</span>` : '—')
        : `<span class="actual">${fmt(r.actual,r.unit)}</span>`;
      const excessCell = e.excess!=null
        ? `<span class="excess">${fmt(e.excess,r.unit)}</span>`
        : `<span class="excess none">—</span>`;

      let cohortHtml = "";
      if(hasCohorts){
        const cid = `coh-${gi}-${ri}`;
        cohortHtml = `
          <button class="cohort-toggle" onclick="document.getElementById('${cid}').classList.toggle('open')">▸ View ${r.cohorts.length} cohorts</button>
          <div class="cohort" id="${cid}">
            <table><thead><tr><th>${r.subject||'Cohort'}</th><th class="num">Actual</th><th class="num">Limit</th><th>Compliance</th></tr></thead>
            <tbody>${r.cohorts.map(c=>{
              const cok = r.op==="min" ? c.actual>=c.limit : c.actual<=c.limit;
              return `<tr><td>${c.k}</td><td class="num">${fmt(c.actual,r.unit)}</td><td class="num">${fmt(c.limit,r.unit)}</td>
                <td><span class="badge ${cok?'b-ok':'b-fail'}"><span class="dot"></span>${cok?'Satisfied':'Breach'}</span></td></tr>`;
            }).join("")}</tbody></table>
          </div>`;
      }

      const kindLabel = r.kind.replace(/_/g," ");
      return `<tr>
        <td class="idx">${r.idx}</td>
        <td class="legal">${r.legal}<div><span class="kindtag">${kindLabel}</span></div>${cohortHtml}</td>
        <td class="num">${actualCell}</td>
        <td class="num">${limitCell}</td>
        <td><span class="badge ${e.badgeClass}"><span class="dot"></span>${e.badgeText}</span></td>
        <td class="num">${excessCell}</td>
      </tr>`;
    }).join("");

    return `<details class="group" open>
      <summary><span class="chev">▸</span>${g.title}<span class="gcount">${g.rules.length} criteria</span></summary>
      <table>
        <thead><tr>
          <th style="width:54px">#</th><th>Concentration criterion (verbatim)</th>
          <th class="num">Actual</th><th class="num">Limit</th><th>Compliance</th><th class="num">Excess</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </details>`;
  }).join("");
}

function downloadCSV(){
  const d = DATA[current];
  const lines = [["Group","#","Kind","Operator","Actual","Limit","Unit","Compliance","Excess","Legal text"]];
  d.groups.forEach(g=>g.rules.forEach(r=>{
    const e=evaluate(r);
    lines.push([g.title, r.idx, r.kind, r.op||"", r.actual??"", r.limit??"", r.unit||"", e.badgeText, e.excess??"", '"'+r.legal.replace(/"/g,'""')+'"']);
  }));
  const csv = lines.map(l=>l.join(",")).join("\n");
  const blob = new Blob([csv],{type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `concentrations-${current}.csv`;
  a.click();
}

renderSelector();
render();
</script>
</body>
